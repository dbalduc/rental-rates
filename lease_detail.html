function b64d(s){const bin=atob(s);const u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
async function unlock(pw){
  const salt=b64d(ENC.salt), iv=b64d(ENC.iv), ct=b64d(ENC.ct);
  const km=await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
  const key=await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt, iterations:ENC.iter, hash:"SHA-256"},
    km, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const buf=await crypto.subtle.decrypt({name:"AES-GCM", iv}, key, ct);
  return new TextDecoder().decode(buf);
}
const f=document.getElementById("f"), pw=document.getElementById("pw"),
      err=document.getElementById("err"), go=document.getElementById("go");
const SKEY="rr_pw";  // per-tab session key so unlocking one page unlocks the other
function reveal(html){document.open();document.write(html);document.close();}
f.addEventListener("submit", async (e)=>{
  e.preventDefault(); err.textContent=""; go.disabled=true; go.textContent="Unlocking…";
  try{
    const html=await unlock(pw.value);
    try{sessionStorage.setItem(SKEY, pw.value);}catch(_){}
    reveal(html);
  }catch(_){
    err.textContent="Incorrect password."; go.disabled=false; go.textContent="Unlock";
    pw.select();
  }
});
// Auto-unlock if the password was already entered this browser session (e.g. navigating
// between the dashboard and the lease-detail page). Falls back to the prompt on any failure.
(async ()=>{
  let saved=null; try{saved=sessionStorage.getItem(SKEY);}catch(_){}
  if(!saved) return;
  try{ reveal(await unlock(saved)); }
  catch(_){ try{sessionStorage.removeItem(SKEY);}catch(_){} }
})();
</script>
